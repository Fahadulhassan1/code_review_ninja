name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout review bot
        uses: actions/checkout@v4
        with:
          repository: Fahadulhassan1/code_review_ninja
          path: agentic-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: agentic-bot
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
        run: |
          if [ -n "$LLM_PROVIDER" ] && [ "$LLM_PROVIDER" != "groq" ]; then
            uv sync --extra "$LLM_PROVIDER"
          else
            uv sync
          fi

      - name: Run AI Code Review
        working-directory: agentic-bot
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'groq' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_RATE_LIMIT: ${{ secrets.GROQ_RATE_LIMIT || '25' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -m code_review \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --post
